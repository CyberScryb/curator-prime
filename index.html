<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Curator Prime — Identify · Value · Collect</title>
  <meta name="description" content="Photograph an antique or collectible. Get identification, value range, authenticity notes, and care tips.">
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            canvas: '#0c0b09',
            surface: '#141210',
            elevated: '#1c1916',
            line: 'rgba(245,240,232,0.10)',
            ink: '#f5f0e8',
            mute: '#a89f94',
            faint: '#6b635a',
            brand: '#c2410c',
            brandsoft: '#e05a2b',
            trust: '#1b3a4b',
          },
          fontFamily: {
            sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
            display: ['"Fraunces"', 'Georgia', 'serif'],
            mono: ['"IBM Plex Mono"', 'ui-monospace', 'monospace'],
          },
          boxShadow: {
            card: '0 12px 40px rgba(0,0,0,0.35)',
            glow: '0 0 40px rgba(194,65,12,0.25)',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    html, body, #root { height: 100%; }
    body {
      background: #0c0b09;
      color: #f5f0e8;
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      margin: 0;
    }
    .font-display { font-family: 'Fraunces', Georgia, serif; }
    .font-mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
    ::-webkit-scrollbar { width: 0; height: 0; }
    @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }
    .animate-flash { animation: flash 0.45s ease-out forwards; }
    @keyframes scan {
      0% { transform: translateY(-100%); opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { transform: translateY(320%); opacity: 0; }
    }
    .animate-scan { animation: scan 2.8s linear infinite; }
    @keyframes bootbar {
      from { width: 0%; }
      to { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
