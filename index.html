
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Curator | Prime</title>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-accent: #3b82f6; 
      --glass-surface: rgba(10, 10, 12, 0.85);
    }

    body {
      background-color: #000000;
      color: #e5e5e5;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      /* Subtle Film Grain */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.07'/%3E%3C/svg%3E");
    }

    .font-display { font-family: 'Cinzel', serif; }
    .font-mono { font-family: 'Space Mono', monospace; }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 0px; background: transparent; }

    /* Scanline Animation */
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }
    .scan-overlay::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.2) 51%);
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 10;
    }

    /* Typewriter Cursor */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .cursor-blink {
      display: inline-block;
      width: 8px;
      height: 1.2em;
      background-color: currentColor;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    /* Additional Animations */
    @keyframes text_decrypt {
      0%, 100% { width: 0; opacity: 1; }
      10% { width: 10%; }
      20% { width: 0; }
      30% { width: 40%; }
      45% { width: 20%; }
      60% { width: 80%; }
      85% { width: 100%; }
    }

    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(0); }
    }

    /* Flash Effect */
    @keyframes flash {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
    .animate-flash {
      animation: flash 0.5s ease-out forwards;
    }
    
    /* Smooth fade in */
    .fade-in-up {
      animation: fadeInUp 0.5s ease-out forwards;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Generic Scan Animation */
    @keyframes scan {
      0% { transform: translateY(-100%); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateY(400%); opacity: 0; }
    }
    .animate-scan {
      animation: scan 4s linear infinite;
    }
    
    /* Smooth transition for growing height */
    .grow-y {
      transform-origin: top;
      animation: growY 0.5s ease-out forwards;
    }
    @keyframes growY {
      from { transform: scaleY(0); }
      to { transform: scaleY(1); }
    }

    /* Utility Classes */
    .mask-linear-fade {
      mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
    }
  </style>
</head>
<body>
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
